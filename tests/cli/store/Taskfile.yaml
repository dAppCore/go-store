version: "3"

tasks:
  default:
    deps: [build, vet, test]

  build:
    dir: ../../..
    cmds:
      - go build ./...

  vet:
    dir: ../../..
    cmds:
      - go vet ./...

  test:
    dir: ../../..
    cmds:
      - go test -count=1 -race ./...

  test-memory:
    dir: ../../..
    cmds:
      - go test -count=1 -race -run "^TestStore_.*Memory" ./...

  test-workspace:
    dir: ../../..
    cmds:
      - go test -count=1 -race -run "^TestWorkspace_" ./...
