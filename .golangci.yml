run:
  timeout: 5m
  go: "1.26"

linters:
  enable:
    - depguard
    - govet
    - errcheck
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
    - gocritic
    - gofmt
  disable:
    - exhaustive
    - wrapcheck

linters-settings:
  depguard:
    rules:
      legacy-module-paths:
        list-mode: lax
        files:
          - $all
        deny:
          - pkg: forge.lthn.ai/
            desc: use dappco.re/ module paths instead

issues:
  exclude-use-default: false
  max-same-issues: 0
