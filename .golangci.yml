version: "2"
run:
  go: "1.26"
linters:
  enable:
    - depguard
    - gocritic
  disable:
    - exhaustive
    - wrapcheck
  settings:
    depguard:
      rules:
        legacy-module-paths:
          list-mode: lax
          files:
            - $all
          deny:
            - pkg: forge.lthn.ai/
              desc: use dappco.re/ module paths instead
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-same-issues: 0
formatters:
  enable:
    - gofmt
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
